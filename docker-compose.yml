services:
  db:
    image: postgres:16-alpine
    container_name: sonic_db
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    container_name: sonic_redis
    env_file:
      - ./.env
    image: redis:8.6.2-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"

  redisinsight:
    container_name: sonic_redisinsight
    image: redis/redisinsight:latest
    env_file:
      - ./.env
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_PASSWORD=${REDIS_PASSWORD}
      - RI_REDIS_ALIAS=${REDIS_ALIAS}
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    depends_on:
      - redis

  api:
    container_name: sonic_api
    build:
      context: .
      dockerfile: api.Dockerfile
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      - db
      - redis

  web:
    container_name: sonic_web
    build:
      context: .
      dockerfile: web.Dockerfile
    env_file:
      - ./.env
    environment:
      API_URL: http://api:${APP_PORT}
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    depends_on:
      - api

volumes:
  db_data:
