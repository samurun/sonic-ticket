services:
  db:
    image: postgres:16-alpine
    container_name: sonic_db
    env_file:
      - ./apps/api/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    container_name: sonic_redis
    env_file:
      - ./apps/api/.env
    image: redis:8.6.2-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"

  redisinsight:
    container_name: sonic_redisinsight
    image: redis/redisinsight:latest
    env_file:
      - ./apps/api/.env
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_PASSWORD=${REDIS_PASSWORD}
      - RI_REDIS_ALIAS=sonic-redis
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    depends_on:
      - redis

